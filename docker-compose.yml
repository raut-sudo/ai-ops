# AI E-Commerce Operations Brain — Canonical Local Development Stack
# Single source of truth for compose orchestration.

name: ai-ops

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-ops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ecomops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ecom_brain
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecomops} -d ecom_brain"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: ai-ops-qdrant
    restart: unless-stopped
    volumes:
      - qdrantdata:/qdrant/storage
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ai-ops-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-ecomops}:${POSTGRES_PASSWORD}@postgres:5432/ecom_brain"
      DATABASE_URL_SYNC: "postgresql+psycopg://${POSTGRES_USER:-ecomops}:${POSTGRES_PASSWORD}@postgres:5432/ecom_brain"
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      APP_ENV: development
      LOG_LEVEL: DEBUG
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"]

  frontend:
    image: node:22-alpine
    container_name: ai-ops-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      BACKEND_URL: http://backend:8000
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    working_dir: /app
    depends_on:
      backend:
        condition: service_started
    command: >
      sh -c "
        corepack enable &&
        corepack prepare pnpm@11.6.0 --activate &&
        pnpm install --ignore-scripts &&
        BACKEND_URL=http://backend:8000 pnpm dev
      "

volumes:
  pgdata:
    driver: local
  qdrantdata:
    driver: local

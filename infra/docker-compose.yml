# AI E-Commerce Operations Brain — Local Development Stack
#
# Services:
#   postgres  — app database (ecom_brain) + LangGraph AsyncPostgresSaver checkpoints
#   qdrant    — vector DB for long-term incident memory
#   backend   — FastAPI app (depends on postgres + qdrant)
#
# Observability (no containers needed):
#   LangSmith — cloud, wired via LANGCHAIN_TRACING_V2 + LANGSMITH_API_KEY env vars
#   Langfuse  — cloud, wired via LANGFUSE_PUBLIC_KEY + LANGFUSE_SECRET_KEY env vars
#   Decision:  Langfuse v3 self-hosted requires ClickHouse + MinIO + Redis + worker
#              (5 extra services) — too heavy for development. Langfuse Cloud free
#              tier provides identical SDK functionality without infra overhead.
#              See DECISIONS.md entry 2026-06-11.
#
# Usage:
#   cp .env.example .env   # fill in API keys
#   docker compose -f infra/docker-compose.yml up -d
#   docker compose -f infra/docker-compose.yml ps

name: ai-ops

services:
  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  # Serves TWO roles:
  #   1. Application data (incidents, actions, sessions, users, audit_logs)
  #   2. LangGraph AsyncPostgresSaver checkpoints (langgraph_checkpoints table)
  postgres:
    image: postgres:16-alpine
    container_name: ai-ops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ecomops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ecom_brain
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecomops} -d ecom_brain"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Qdrant ───────────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: ai-ops-qdrant
    restart: unless-stopped
    volumes:
      - qdrantdata:/qdrant/storage
    ports:
      - "${QDRANT_PORT:-6333}:6333"   # REST / gRPC
      - "6334:6334"                   # gRPC (optional)
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Backend (FastAPI + LangGraph) ────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    container_name: ai-ops-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - ../.env
    environment:
      # Override DB URL to use Docker service name, not localhost
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-ecomops}:${POSTGRES_PASSWORD}@postgres:5432/ecom_brain"
      DATABASE_URL_SYNC: "postgresql://${POSTGRES_USER:-ecomops}:${POSTGRES_PASSWORD}@postgres:5432/ecom_brain"
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      APP_ENV: development
      LOG_LEVEL: DEBUG
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    # Dev override: reload on code changes via volume mount (see override file)
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  pgdata:
    driver: local
  qdrantdata:
    driver: local
